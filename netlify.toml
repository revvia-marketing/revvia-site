# Netlify build config. The @astrojs/netlify adapter wires the SSR function
# (for /keystatic) and emits _redirects; this just pins the build + Node.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Security + caching niceties (optional, safe defaults)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
